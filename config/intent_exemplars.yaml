# Embedding exemplars for query intent routing (assistant meta vs engineering).
# New paraphrases generalize via similarity — add exemplars only for new intent clusters,
# not for every user utterance.

assistant_meta:
  - 你是谁
  - 你的角色是什么
  - 你可以做什么
  - 你能帮我做什么
  - 介绍一下你自己
  - 可以给你改个名字吗
  - 怎么使用 EE-Wiki
  - Who are you?
  - What is your role?
  - What can you do?

engineering:
  - RMII 连接了哪些器件
  - VBAT 电压是多少
  - PMIC 供电网络说明
  - UART 调试步骤
  - W25Q128 写保护怎么配置
  - 这个板的 Ethernet 接口有哪些信号
  - load-diags 怎么验证
  - What nets are on the RMII interface?
