# EE-Wiki default configuration (no secrets).
# Override paths via environment variables; see .env.example.

data:
  raw_dir: data/raw
  processed_dir: data/processed
  indexes_dir: data/indexes
  graph_dir: data/graph
  exports_dir: data/exports   # FA Keynote summaries etc. (ADR 0010); GET /v1/exports/
  cache_dir: data/cache       # FA Flames/Radar cache; GET /v1/cache/

models:
  base_dir: /Users/ml/Documents/Models
  layout_model: layoutlmv3-base
  visual_model: Qwen3-VL-8B-Instruct
  embedding_model: bge-m3
  reranker_model: bge-reranker-v2-m3
  # llm_transformers_model: Qwen3.5-4B
  # llm_mlx_model: Meta-Llama-3-70B-Instruct-4bit
  # llm_mlx_model: GLM-4.7-Flash-MLX-8bit

generation:
  llm_backend: openai          # mlx | transformers | openai (multi-user: openai + mlx-openai-server)
  max_new_tokens: 2048      # was 1024; long multi-citation answers need more headroom
  default_task: wiki
  default_template: default
  llm_timeout_seconds: 180  # allow ~2048 tokens on 9B MLX; null or 0 disables
  # Multi-user LAN (llm_backend: openai) — start mlx-openai-server first, then serve.py
  openai_base_url: http://127.0.0.1:8000/v1
  openai_model: Qwen3-30B-A3B-Instruct-2507-MLX-4bit
  # openai_api_key: null
  assistant_fallback: true   # when retrieval is weak, answer from the assistant role prompt instead of weak chunks
  assistant_task: assistant  # prompts/{task}/ for the weak-retrieval fallback (identity/usage or "no relevant content")
  weak_rerank_threshold: -4.0  # retrieval counts as weak (KB lacks answer) below this rerank logit; VLM-regenerated schematic chunks score ~-2.2 for relevant hits
  query_rewrite: true                   # rewrite follow-up questions using conversation history
  query_rewrite_max_history_turns: 4    # max prior turns fed to the rewrite prompt
  task_classification: true             # auto-select prompt task via LLM intent classification
  query_prepare: merged                 # merged | separate — one LLM call for rewrite + classify
  inline_citation_images: true          # append referenced schematic/document images after the answer
  max_inline_images: 4                  # cap on images appended per answer
  scope_inference: true                 # infer product/revision/layer from natural language
  scope_inference_mode: merged          # rules | llm | merged
  show_elapsed_time: true              # append 检索/生成/首字 phase timings after RAG answers

ingestion:
  excel:
    output_format: markdown_table   # markdown_table | plain_text
    include_empty_sheets: false
  iwork:
    enabled: true                      # macOS only; .key / .numbers via Keynote/Numbers export
    keynote_export_timeout_seconds: 600
    numbers_export_timeout_seconds: 600
    quit_apps_after_export: false      # keep false for faster batch sync
  prose_pdf:
    min_text_chars: 40       # per-page embedded text below this triggers OCR
    ocr_dpi: 200
    ocr_language: auto       # auto | eng | eng+chi_sim | other tesseract codes
    ocr_language_fallback: eng+chi_sim  # used when auto cannot infer script (image-only PDFs)
    # tessdata_dir: null     # auto-detect Homebrew/Linux paths; or set explicitly
    extract_images: true            # extract embedded raster images from PDF pages
    describe_images: ocr            # off | ocr | vlm — how to generate searchable text for images
    min_image_area: 10000           # pixel area threshold; smaller images (logos, icons) are skipped
    max_images_per_page: 5          # cap per-page image count to avoid noise
    images_rel_prefix: images       # subdirectory name under processed mirror for saved images
    image_dedup_max_pages: 3        # images appearing on more than this many pages are treated as templates
  schematic_pdf:
    layout_zoom: 2.0          # temp3.py render zoom for LayoutLM + crops
    min_figure_area: 10000
    ocr_text_max_chars: 2500  # VLM prompt OCR budget (vlm_plus_ocr only)
    # Default ocr_only: FA-grade truth is netlist/.brd (ADR 0009 gate), not VLM
    # narrative. Use vlm_plus_ocr only when you need schematic prose for RAG recall.
    fidelity_mode: ocr_only   # ocr_only | vlm_plus_ocr (layout + VLM + OCR appendix)
    max_new_tokens: 1536
    vlm_max_image_side: 1280   # downscale full-page renders before VLM to save MPS memory
    temperature: 0.1
    do_sample: false
    images_rel_prefix: images
    save_page_images: true        # save full-page renders as PNG alongside figure crops
    # ADR 0007 / 0009 — PDF + netlist + boardview complementary connectivity map
    connectivity:
      enabled: true
      write_sidecar: true           # *.connectivity.json next to processed .md
      max_connector_distance: 90.0  # PDF geometry: net label → connector center (page pts)
      companion_extensions:         # discovery next to sch PDF / sch/cad/
        netlist:
          - .net
          - .kicad_sch
          - .kicad_pro
          - .SchDoc
          - .prjpcb
          - .PrjPcb
        boardview:
          - .brd
      # FA-grade trace gate (ADR 0009 / 0010): only these evidence tags count as
      # board-verified electrical truth. Advisory pdf_geometry / ocr_spatial never
      # grounds a trace answer — chat / MCP / FA refuse instead of guessing.
      # BoardView (.brd) is intentionally NOT in this list: it is retained as
      # advisory reference (net membership / probe points) but must not ground a
      # trace (decision 2026-07-21).
      authoritative_evidence:
        - cad_netlist
      require_authority_for_trace: true
  datasheet_pdf:
    min_text_chars_for_skip: 500  # pages with more embedded text and few vector lines → text_only
    vector_line_threshold: 50     # pages with more drawing ops than this → table
    image_area_threshold: 0.6     # pages with raster images covering >60% → graph
    max_new_tokens: 2048          # tables can be long; more headroom than schematic
    vlm_max_image_side: 1280      # downscale pages before VLM
    temperature: 0.1
    do_sample: false
    ocr_fidelity: true            # append raw OCR text for lossless searchability
    save_page_images: true        # save full-page renders for citation images
    images_rel_prefix: images
    # Prefer OCR as page body when VLM markdown fails quality heuristics (table/graph/mixed)
    vlm_quality_gate: true
    vlm_max_empty_cell_ratio: 0.45      # fail if empty MD-table cells exceed this fraction
    vlm_min_length_ratio: 0.25          # fail if len(vlm) / len(ocr) below this
    vlm_max_garble_ratio: 0.12          # fail if garbled-token fraction exceeds this
    vlm_min_ocr_chars_for_fallback: 80  # require this much OCR before replacing VLM body
    vlm_min_table_rows_vs_ocr_lines: 0.15  # fail if table rows << OCR nonempty lines

chunking:
  max_chars: 1500
  overlap_chars: 100
  min_chars: 50
  excerpt_chars: 200

indexing:
  embed_device: cpu        # cpu | mps | cuda | auto — CPU avoids MPS embedding bugs on Apple Silicon
  embed_batch_size: 8

# Knowledge graph (V3) — built from indexes into data/graph/
graph:
  scope_inheritance: true   # neighbor/path/filter expand like retrieval (build → common → global)
  power_tree: true          # V3 P3 — extract Rail nodes + supplies/derived_from at graph build

# Engineering rules (V3 P4) — YAML pack evaluated against graph + cases
rules:
  enabled: true
  pack_dir: config/rules    # relative to repo root; *.yaml rule definitions

retrieval:
  top_k_embed: 20
  top_k_bm25: 20
  top_k_final: 8            # was 8; fewer chunks → shorter prompt, room for longer answers
  scope_inheritance: true
  scope_cascade: true                    # tier cascade: build → common → global when inheritance on
  scope_sufficient_rerank: -3.0          # tier "found"; below → expand to next phase
  scope_quota_build: 6                   # max build-tier slots in final context (of top_k_final)
  scope_quota_common: 2                  # max project-common supplement slots
  scope_quota_global: 2                  # max global supplement slots
  top_k_dense: 4
  top_k_sparse: 4
  expand_sections: true   # merge sibling chunks from the same heading section
  min_rerank_score: null  # drop retrieval when top rerank logit is below this; null disables
  case_lookup: true       # V3 P2 — boost FA chunks matching debug cases; enable case search
  case_lookup_boost: 3    # extra ranking weight when a chunk belongs to a matched case
  graph_enrichment: false # V3 P5 — attach compact graph neighborhood to RAG context (off by default)
  graph_enrichment_max_hops: 1
  graph_enrichment_max_nodes: 12
  graph_enrichment_power_tree: true # route power/rail queries through directed PowerTreeQuery (what_feeds/what_powers/flags)

# Path segment names for shared libraries (must match data/raw/ folders)
# Canonical raw layout (ADR 0011) — three scope levels: product / project / build
#   global/{type}                       → product=global, project=global, build=global
#   {product}/common/{type}             → product common   (project=common, build=common)
#   {product}/{project}/common/{type}   → project common   (build=common)
#   {product}/{project}/{build}/{type}  → build truth
# Reserved words `global` and `common` may not be used as ordinary segment slugs.
data_layout:
  enterprise_project: global   # reserved top segment for the enterprise library
  project_shared_build: common # reserved shared segment (product/project common tiers)
  document_type_folders:
    note: engineering_note
    sch: schematic
    sop: sop
    datasheet: datasheet
    fa: failure_analysis   # add new folders here — no code change required
  # 甲方 / 乙方等混用名 → EE-Wiki 路径 slug（bare project 或 product/project）
  project_aliases:
    H340: logan
    # Stub / lab sample rdar://101493937 title carries Ruby / Scarif tokens;
    # component name "B5xx HW Build FATP" alone does not match EE-Wiki slugs.
    Scarif: ipad/logan
    Ruby: ipad/logan
    B5xx: ipad/logan
    # example: customer_code: iphone/logan

# Multi-agent runtime (ADR 0008) — Supervisor + ToolBus + config-driven roles
agents:
  enabled: true
  roles_dir: config/agents/roles
  max_roles_per_turn: 3          # max specialists selected by one semantic route
  route_score_threshold: 2       # rules-first: min keyword hits to skip semantic LLM (ADR 0012)
  max_steps: 8
  max_tool_calls: 16
  tool_timeout_seconds: 60
  max_concurrent_tools: 2
  span_log: data/cache/agents/spans.jsonl

# FA session connectors (ADR 0010) — stub backends by default (no Apple/Flames network)
fa:
  enabled: true
  radar:
    backend: stub              # stub | radarclient (live: Kerberos ticket + radarclient on PYTHONPATH)
    # Non-canonical radar ids only; rdar://101493937 always uses real B5xx/P0 from radar.log.
    stub_component_name: B5xx HW Build FATP
    stub_component_version: P0
    client_system_name: EE-Wiki
    client_system_version: "1.0"
  flames:
    backend: manual            # manual (Open WebUI paste; default) | stub | live
    # base_url: null           # for live when Flames API is available
    timeout_seconds: 60
  report:
    template_path: assets/templates/fa/one_page.key

api:
  host: 0.0.0.0
  port: 8080
  # Browser-reachable base for citation download links + inline images embedded
  # in answers. Set to the machine's LAN IP (not localhost) when Open WebUI /
  # browser may run on another device on the same network, so citation + image
  # links resolve from those devices too. Current value = en1/IPv4 on this Mac.
  # Caveat: a DHCP reassigned IP will break these links again — re-point this
  # (or switch Open WebUI+EE-Wiki to the same host with localhost) when that happens.
  public_base_url: http://172.20.10.2:8080
  warmup_on_startup: true
  request_timeout_seconds: 300  # whole RAG request cap; null or 0 disables
  max_concurrent_ingest_jobs: 1  # async POST /v1/ingest workers; extra jobs queue in-memory
  # Cross-turn TurnScope carry (ADR 0012 §6). When ON, the locked
  # (product, project, build) is embedded as a hidden marker in the assistant
  # reply and recovered from history on the next turn, so follow-ups with no
  # scope words inherit it. Stateless and multi-worker safe (works under
  # ``uvicorn --workers N`` — no shared store). Deterministic (no NL
  # re-inference); explicit body/question scope always wins. Open WebUI does not
  # echo scope, so this is ON by default to fix follow-up scope loss.
  carry_scope_across_turns: true
  concurrency:
    max_concurrent: 6       # MLX in-process: must stay 1; openai backend: try 6
    max_queue_depth: 12      # additional requests allowed to wait (openai: try 12)
    retry_after_seconds: 15 # Retry-After header when queue is full
