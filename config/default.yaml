# EE-Wiki default configuration (no secrets).
# Override paths via environment variables; see .env.example.

data:
  raw_dir: data/raw
  processed_dir: data/processed
  indexes_dir: data/indexes
  graph_dir: data/graph

models:
  base_dir: /Users/ml/Documents/Models
  layout_model: layoutlmv3-base
  visual_model: Qwen3-VL-4B-Instruct
  embedding_model: bge-m3
  reranker_model: bge-reranker-v2-m3
  # llm_transformers_model: Qwen3.5-4B
  llm_mlx_model: Qwen3-30B-A3B-Instruct-2507-MLX-4bit
  # llm_mlx_model: GLM-4.7-Flash-MLX-8bit

generation:
  llm_backend: openai          # mlx | transformers | openai (multi-user: openai + mlx-openai-server)
  max_new_tokens: 2048      # was 1024; long multi-citation answers need more headroom
  default_task: wiki
  default_template: default
  llm_timeout_seconds: 180  # allow ~2048 tokens on 9B MLX; null or 0 disables
  # Multi-user LAN (llm_backend: openai) — start mlx-openai-server first, then serve.py
  openai_base_url: http://127.0.0.1:8000/v1
  openai_model: Qwen3-30B-A3B-Instruct-2507-MLX-4bit
  # openai_api_key: null
  assistant_fallback: true   # when retrieval is weak, answer from the assistant role prompt instead of weak chunks
  assistant_task: assistant  # prompts/{task}/ for the weak-retrieval fallback (identity/usage or "no relevant content")
  weak_rerank_threshold: -4.0  # retrieval counts as weak (KB lacks answer) below this rerank logit; VLM-regenerated schematic chunks score ~-2.2 for relevant hits
  query_rewrite: true                   # rewrite follow-up questions using conversation history
  query_rewrite_max_history_turns: 4    # max prior turns fed to the rewrite prompt
  task_classification: true             # auto-select prompt task via LLM intent classification
  query_prepare: merged                 # merged | separate — one LLM call for rewrite + classify
  inline_citation_images: true          # append referenced schematic/document images after the answer
  max_inline_images: 4                  # cap on images appended per answer

ingestion:
  excel:
    output_format: markdown_table   # markdown_table | plain_text
    max_rows_per_sheet: null
    include_empty_sheets: false
  word: {}
    # libreoffice_path: /Applications/LibreOffice.app/Contents/MacOS/soffice
  prose_pdf:
    max_pages: null
    min_text_chars: 40       # per-page embedded text below this triggers OCR
    ocr_dpi: 200
    ocr_language: auto       # auto | eng | eng+chi_sim | other tesseract codes
    ocr_language_fallback: eng+chi_sim  # used when auto cannot infer script (image-only PDFs)
    # tessdata_dir: null     # auto-detect Homebrew/Linux paths; or set explicitly
    extract_images: true            # extract embedded raster images from PDF pages
    describe_images: ocr            # off | ocr | vlm — how to generate searchable text for images
    min_image_area: 10000           # pixel area threshold; smaller images (logos, icons) are skipped
    max_images_per_page: 5          # cap per-page image count to avoid noise
    images_rel_prefix: images       # subdirectory name under processed mirror for saved images
    image_dedup_max_pages: 3        # images appearing on more than this many pages are treated as templates
  schematic_pdf:
    layout_zoom: 2.0          # temp3.py render zoom for LayoutLM + crops
    min_figure_area: 10000
    ocr_text_max_chars: 2500  # VLM prompt OCR budget (vlm_plus_ocr only)
    fidelity_mode: vlm_plus_ocr   # ocr_only | vlm_plus_ocr (layout + VLM + OCR appendix)
    # max_pages: null         # null = all pages
    max_pages: null
    max_new_tokens: 1536
    vlm_max_image_side: 1280   # downscale full-page renders before VLM to save MPS memory
    temperature: 0.1
    do_sample: false
    images_rel_prefix: images
    save_page_images: true        # save full-page renders as PNG alongside figure crops
  datasheet_pdf:
    max_pages: null
    min_text_chars_for_skip: 500  # pages with more embedded text and few vector lines → text_only
    vector_line_threshold: 50     # pages with more drawing ops than this → table
    image_area_threshold: 0.6     # pages with raster images covering >60% → graph
    max_new_tokens: 2048          # tables can be long; more headroom than schematic
    vlm_max_image_side: 1280      # downscale pages before VLM
    temperature: 0.1
    do_sample: false
    ocr_fidelity: true            # append raw OCR text for lossless searchability
    save_page_images: true        # save full-page renders for citation images
    images_rel_prefix: images

chunking:
  max_chars: 1500
  overlap_chars: 100
  min_chars: 50
  excerpt_chars: 200

indexing:
  embed_device: cpu        # cpu | mps | cuda | auto — CPU avoids MPS embedding bugs on Apple Silicon
  embed_batch_size: 8

retrieval:
  top_k_embed: 20
  top_k_bm25: 20
  top_k_final: 6            # was 8; fewer chunks → shorter prompt, room for longer answers
  scope_inheritance: true
  top_k_dense: 4
  top_k_sparse: 4
  expand_sections: true   # merge sibling chunks from the same heading section
  min_rerank_score: null  # drop retrieval when top rerank logit is below this; null disables

# Path segment names for shared libraries (must match data/raw/ folders)
data_layout:
  enterprise_project: global
  project_shared_build: common
  document_type_folders:
    note: engineering_note
    sch: schematic
    sop: sop
    datasheet: datasheet
    fa: failure_analysis   # add new folders here — no code change required

api:
  host: 0.0.0.0
  port: 8080
  public_base_url: http://192.168.0.155:8080
  warmup_on_startup: true
  request_timeout_seconds: 300  # whole RAG request cap; null or 0 disables
  concurrency:
    max_concurrent: 6       # MLX in-process: must stay 1; openai backend: try 6
    max_queue_depth: 12      # additional requests allowed to wait (openai: try 12)
    retry_after_seconds: 15 # Retry-After header when queue is full
