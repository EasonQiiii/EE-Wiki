# EE-Wiki default configuration (no secrets).
# Override paths via environment variables; see .env.example.

data:
  raw_dir: data/raw
  processed_dir: data/processed
  indexes_dir: data/indexes
  graph_dir: data/graph

models:
  base_dir: models
  # embedding_model: null   # set via ADR
  # reranker_model: null
  # llm_model: null

retrieval:
  top_k_embed: 20
  top_k_bm25: 20
  top_k_final: 8
  scope_inheritance: true   # build query also searches project/common + global

# Path segment names for shared libraries (must match data/raw/ folders)
data_layout:
  enterprise_project: global    # data/raw/global/
  project_shared_build: common  # data/raw/{project}/common/
  document_type_folders:
    note: engineering_note
    sch: schematic
    sop: sop
    datasheet: datasheet

api:
  host: 0.0.0.0
  port: 8080
