  - id: Q-006
    title: Mahi PingPong 测试
    category: scope
    mandatory: true
    filters:
      project: kingboo
      build: common
    scope_label: common
    question: Kingboo 项目中 Mahi PingPong Test 的目的是什么？Feature 0x43 返回的数据里，前 4 字节和后 4 字节分别代表什么？
    expected_answer: |
      目的：Unit Tx 端发送固定包数（OOK），与 Rx 端接收包数（ASK）对比，验证收发包数一致。
      Feature 43,A0,00,00,00,A0,00,00,00,00,00,00,00 中：第一组 4 字节为 PingPong package send number；
      第二组 4 字节为 PingPong package receive number；后续 00,00,00,00 为 PingPong package error number。
    expected_facts:
      - OOK
      - ASK
      - send number
      - receive number
      - error number
    required_sources:
      - data/processed/kingboo/common/note/mahi_info.md

  - id: Q-007
    title: Mahi OOK 干扰测试
    category: scope
    mandatory: true
    filters:
      project: kingboo
      build: common
    scope_label: common
    question: Mahi OOK Test 中，Unit 作为 Aggressor 会发送哪三种频率的 OOK-PRBS 信号？最恶劣条件下 VDDPA 和 SignalScale 设置是多少？
    expected_answer: |
      三种频率 53 kHz、70 kHz、105 kHz；worse case 下 VDDPA=7.2 V，SignalScale=50%；
      目的为以 Mahi OOK 作为干扰源检测对 Victim 的影响。
    expected_facts:
      - "53"
      - "70"
      - "105"
      - "7.2 V"
      - "50%"
    required_sources:
      - data/processed/kingboo/common/note/mahi_info.md

