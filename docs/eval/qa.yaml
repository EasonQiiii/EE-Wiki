    scope_label: global
    question: iPad 工程手册中，通过 USB 建立 SSH 时，Mac 端应执行什么命令开启隧道？连接端口是多少？
    expected_answer: |
      命令 tcprelay --portoffset 10000 ssh；监听 localhost:10022；
      连接示例 ssh -o NoHostAuthenticationForLocalhost=yes -p 10022 root@localhost。
