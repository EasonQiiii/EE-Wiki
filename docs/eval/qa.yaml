      build: common
    scope_label: common
    question: Mahi CoEx 工站 Pencil 额定容量 50 mAh 时，三种充电电流 5 mA / 50 mA / 200 mA 分别对应多少 C 倍率？
    expected_answer: |
      5 mA → 0.1 C；50 mA → 1 C；200 mA → 4 C；公式为充电倍率 = 充电电流 / 额定容量。
    expected_facts:
