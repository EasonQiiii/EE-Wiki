      weight: 0.20
      max_score: 2
      description: Citations correct; answer labels build/common/global layer
    stability:
      weight: 0.15
      max_score: 2
      description: Paraphrase variants score consistently (stability cases only)
  pass_thresholds:
    mandatory_accuracy: 0.90
    weighted_mean: 1.6
    negative_refusal_rate: 1.0

cases:
  - id: Q-001
    title: STM32F407 核心参数
    category: datasheet
    mandatory: true
    filters:
      project: global
      build: global
    scope_label: global
    question: STM32F407ZGT6 的最高 CPU 主频、Flash 和 SRAM 容量分别是多少？
    expected_answer: |
      最高 CPU 频率 168 MHz；嵌入式 Flash 最高 1 Mbyte；嵌入式 SRAM 最高 192 Kbytes（含 64 Kbytes CCM）。
    expected_facts:
      - "168 MHz"
      - "1 Mbyte"
      - "192 Kbytes"
    required_sources:
      - data/processed/global/datasheet/STM32F407ZGT6.md
    must_not_contain:
      - "200 MHz"
      - "2 Mbyte"

  - id: Q-003
    title: Logan P1 以太网 PHY
    category: schematic
    mandatory: true
    filters:
      project: logan
      build: p1
    scope_label: build
    question: Explorer STM32F4 V2.2 原理图中，以太网接口使用哪款 PHY 芯片？MCU 与 PHY 之间采用什么接口？参考时钟频率是多少？
    expected_answer: |
      PHY 芯片 LAN8720A；MCU 与 PHY 通过 RMII 连接（含 TXD0/1、RXD0/1、TXEN、MDIO/MDC、ETH_RESET 等）；参考时钟 25 MHz 晶振。
    expected_facts:
      - LAN8720A
      - RMII
      - "25 MHz"
    required_sources:
      - data/processed/logan/p1/sch/Explorer STM32F4_V2.2_SCH.md
    must_not_contain:
      - 千兆 PHY

