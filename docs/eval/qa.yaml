  - id: Q-010
    title: TI 8D 客退分析
    category: fa
    mandatory: true
    filters:
      project: global
      build: global
    scope_label: global
    question: QEM-CCR-2311-00781 报告中，客户反馈的 TI 器件型号和客户料号是什么？TI 判定的根因是什么？是否存在系统性批次风险？
    expected_answer: |
      TI P/N XTPS612994YBHR；Customer P/N 353S03433；客户问题 output abnormally。
      根因 Electrically Induced Physical Damage (EIPD)，最可能由 EOS 导致；无证据表明批次系统性问题。
    expected_facts:
      - XTPS612994YBHR
      - "353S03433"
      - EIPD
      - EOS
    required_sources:
      - data/processed/global/fa/QEM-CCR-2311-00781_XTPS612994YBHR.md
    must_not_contain:
      - 设计缺陷
      - 硅片批次不良

