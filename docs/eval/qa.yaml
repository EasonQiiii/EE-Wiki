version: "1.0"

corpus:
  manifest: data/indexes/manifest.json
  chunk_count: 4676
  built_at: "2026-07-11T08:37:00Z"
  coverage:
    - global
    - kingboo/common
    - logan/p1

scoring:
  dimensions:
    retrieval:
      weight: 0.30
      max_score: 2
      description: Top chunks hit required_sources; scope correct
    answer_accuracy:
      weight: 0.35
      max_score: 2
      description: Key facts match expected_answer; no hallucinated parts/nets/values
