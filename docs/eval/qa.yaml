    expected_answer: |
      HCUR 电流发生端子；HPOT HI 侧电压检测端子；LPOT LO 侧电压检测端子；LCUR 电流检测端子。
    expected_facts:
      - HCUR
      - HPOT
      - LPOT
      - LCUR
    required_sources:
